version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: google_opinion_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: google_opinion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: mateuszolee/optyk-crm:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: google_opinion_app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/google_opinion
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret}
      AUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
